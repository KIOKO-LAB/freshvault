name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm provenance + MCP registry OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # NOTE: no registry-url here — it writes an (empty) _authToken into
          # .npmrc, which silently breaks OIDC trusted publishing.
      - run: npm ci
      - run: npm test
      # Publish via Trusted Publishing (OIDC, tokenless). Idempotent: skip if
      # this version is already on npm, so tag re-pushes never double-publish.
      - run: npm install -g npm@latest
      - name: Check if version already published
        id: check
        run: |
          V=$(node -p "require('./package.json').version")
          if [ "$(npm view freshvault@$V version 2>/dev/null)" = "$V" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "freshvault@$V already on npm — skipping publish"
          fi
      - name: Publish (OIDC trusted publishing)
        if: steps.check.outputs.skip != 'true'
        run: npm publish --access public

      # Publish to the official MCP registry (aggregators auto-sync from it)
      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz \
            | tar xz mcp-publisher
      - name: Publish to MCP registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
        continue-on-error: true # registry is in preview; don't fail the release
