name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm provenance + MCP registry OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      # Trusted Publishing (OIDC): no token needed. Requires npm >= 11.5.1
      # and the repo+workflow registered as a Trusted Publisher on npmjs.com.
      - run: npm install -g npm@latest
      - run: npm publish --access public

      # Publish to the official MCP registry (aggregators auto-sync from it)
      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz \
            | tar xz mcp-publisher
      - name: Publish to MCP registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
        continue-on-error: true # registry is in preview; don't fail the release
