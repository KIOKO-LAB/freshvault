name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm provenance + MCP registry OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # NOTE: no registry-url here — it writes an (empty) _authToken into
          # .npmrc, which silently breaks OIDC trusted publishing.
      - run: npm ci
      - run: npm test
      # Publish: try Trusted Publishing (OIDC, tokenless) first; fall back to
      # NPM_TOKEN if the trusted publisher isn't configured. Whichever exists wins.
      - run: npm install -g npm@latest
      - name: Publish (OIDC trusted publishing)
        id: oidc
        continue-on-error: true
        run: npm publish --access public
      - name: Publish (token fallback)
        if: steps.oidc.outcome == 'failure'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          echo "token authenticates as: $(npm whoami || echo '<invalid token>')"
          npm publish --access public

      # Publish to the official MCP registry (aggregators auto-sync from it)
      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz \
            | tar xz mcp-publisher
      - name: Publish to MCP registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
        continue-on-error: true # registry is in preview; don't fail the release
